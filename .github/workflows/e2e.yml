name: E2E Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: guardian/setup-scala@v1

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('e2e/package-lock.json') }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Install Playwright system deps (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: e2e

      - name: Build frontend
        run: npm run build:frontend

      - name: Compile dev server
        run: sbt devServer/compile

      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: true
        # Playwright starts sbt devServer/run via webServer config (timeout: 30s)
        # Classes are already compiled above so startup is JVM + HTTP4S binding only

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
